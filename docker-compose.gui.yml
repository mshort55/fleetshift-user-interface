# Extends the base infra compose with the GUI dev server.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gui.yml up --build

services:
  gui:
    build:
      context: .
      target: gui
    ports:
      - "3000:3000"
    environment:
      - API_PROXY_TARGET=http://mock-servers:4000
      - KEYCLOAK_URL=http://localhost:8080
    depends_on:
      - mock-servers
      - mock-ui-plugins
