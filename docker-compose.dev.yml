# Dev environment — Keycloak + mock-servers (live K8s) + mock-ui-plugins.
# GUI and CLI run locally on the host.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# Local GUI:  npm run dev -w packages/gui   → http://localhost:3000
# API:        http://localhost:4000
# Plugins:    http://localhost:8001
# Keycloak:   http://localhost:8080  (admin / admin)

volumes:
  ui-plugins-dist:

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/fleetshift-realm.json:/opt/keycloak/data/import/fleetshift-realm.json:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/null > /dev/tcp/localhost/9000"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  mock-servers:
    build:
      context: .
      dockerfile: Dockerfile.mock-servers
    ports:
      - "4000:4000"
    volumes:
      - ./packages/mock-servers/src:/opt/app-root/src/packages/mock-servers/src:ro
      - ./packages/common/src:/opt/app-root/src/packages/common/src:ro
      - ./packages/mock-servers/clusters.yaml:/opt/app-root/src/packages/mock-servers/clusters.yaml:ro
      - ./packages/mock-servers/.env:/opt/app-root/src/packages/mock-servers/.env:ro
      - ui-plugins-dist:/opt/app-root/src/packages/mock-ui-plugins/dist:ro
      - ./packages/mock-cli-plugins/dist/cli-plugin-registry.json:/opt/app-root/src/packages/mock-cli-plugins/dist/cli-plugin-registry.json:ro
      - ${KUBECONFIG:-~/.kube/config}:/tmp/kubeconfig:ro
      - ${MINIKUBE_HOME:-~/.minikube}:/tmp/.minikube:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MODE: live
      K8S_TLS_INSECURE: "1"
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      keycloak:
        condition: service_healthy
      mock-ui-plugins:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Rewrite kubeconfig: remap 127.0.0.1 → host.docker.internal
        # and remap cert paths to the mounted .minikube volume
        sed \
          -e 's|server: https://127.0.0.1:|server: https://host.docker.internal:|g' \
          -e "s|$$HOME/.minikube|/tmp/.minikube|g" \
          -e 's|/Users/[^/]*/.minikube|/tmp/.minikube|g' \
          /tmp/kubeconfig > /tmp/kubeconfig-docker
        export KUBECONFIG=/tmp/kubeconfig-docker
        exec npm run dev -w packages/mock-servers

  mock-ui-plugins:
    build:
      context: .
      dockerfile: Dockerfile.mock-ui-plugins
    ports:
      - "8001:8001"
    volumes:
      - ./packages/mock-ui-plugins/src:/opt/app-root/src/packages/mock-ui-plugins/src:ro
      - ./packages/mock-ui-plugins/webpack.config.ts:/opt/app-root/src/packages/mock-ui-plugins/webpack.config.ts:ro
      - ui-plugins-dist:/opt/app-root/src/packages/mock-ui-plugins/dist
    depends_on:
      keycloak:
        condition: service_healthy
