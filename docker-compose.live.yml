# Live mode — mock-servers proxies to a real Kubernetes cluster (e.g. minikube)
# instead of using SQLite seed data.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.live.yml up --build
#
# With GUI:
#   docker compose -f docker-compose.yml -f docker-compose.gui.yml -f docker-compose.live.yml up --build
#
# Requires: minikube (or another k8s cluster) running on the host.
# The kubeconfig server address 127.0.0.1 is remapped to host.docker.internal
# so the container can reach the host's k8s API.

services:
  mock-servers:
    environment:
      MODE: live
      K8S_TLS_INSECURE: "1"
    volumes:
      - ${KUBECONFIG:-~/.kube/config}:/tmp/kubeconfig:ro
      - ${MINIKUBE_HOME:-~/.minikube}:/tmp/.minikube:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Rewrite kubeconfig: remap 127.0.0.1 → host.docker.internal
        # and remap cert paths to the mounted .minikube volume
        sed \
          -e 's|server: https://127.0.0.1:|server: https://host.docker.internal:|g' \
          -e "s|$$HOME/.minikube|/tmp/.minikube|g" \
          -e 's|/Users/[^/]*/.minikube|/tmp/.minikube|g' \
          /tmp/kubeconfig > /tmp/kubeconfig-docker
        export KUBECONFIG=/tmp/kubeconfig-docker
        exec npm run start -w packages/mock-servers
