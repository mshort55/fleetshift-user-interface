# Infra only — mock API server + plugin asset servers + Keycloak IDP.
# Connect the CLI locally via: --api-base http://localhost:4000/api/v1
#
# Usage:
#   docker compose up --build
#
# To also run the GUI:
#   docker compose -f docker-compose.yml -f docker-compose.gui.yml up --build
#
# Keycloak admin console: http://localhost:8080/admin (admin / admin)
# Fleetshift realm:       http://localhost:8080/realms/fleetshift
#
# Test users (realm: fleetshift, password: test):
#   ops   — Ops persona
#   dev   — Dev persona
#   admin — Both personas

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/fleetshift-realm.json:/opt/keycloak/data/import/fleetshift-realm.json:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/null > /dev/tcp/localhost/9000"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  mock-servers:
    build:
      context: .
      target: mock-servers
    ports:
      - "4000:4000"
    environment:
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      keycloak:
        condition: service_healthy

  mock-ui-plugins:
    build:
      context: .
      target: mock-ui-plugins
    ports:
      - "8001:8001"
    depends_on:
      keycloak:
        condition: service_healthy

  mock-cli-plugins:
    build:
      context: .
      target: mock-cli-plugins
    ports:
      - "8002:8002"
    depends_on:
      keycloak:
        condition: service_healthy
